<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order - Aegean Labs</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible+Next:ital,wght@0,200..800;1,200..800&family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&family=Mozilla+Headline:wght@200..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=arrow_back,arrow_right_alt,music_note,music_off" />
</head>
<body style="background-color: #000; color: #f2eee1; font-family: 'Atkinson Hyperlegible Next', sans-serif; padding-top: 100px; margin: 0; min-height: 100vh; position: relative; user-select: none; -webkit-user-select: none; -ms-user-select: none;">
    
    <div class="fire-container">
        <div class="blob blob-left"></div>
        <div class="blob blob-right"></div>
    </div>
    <div class="blend-overlay"></div>

    <nav class="glass-nav" style="padding: 0 50px; z-index: 10;">
        <a href="index.html" class="nav-link"><span class="material-symbols-outlined">arrow_back</span></a>
        <a href="javascript:void(0)" id="audio-toggle-btn" class="nav-link" onclick="toggleAudio()"><span id="audio-icon" class="material-symbols-outlined">music_off</span></a>
    </nav>

    <div style="max-width: 600px; margin: 0 auto; padding: 50px; background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); border-radius: 25px; border: 1px solid rgba(255, 255, 255, 0.1); position: relative; z-index: 2;">
        <h2 style="font-family: 'Mozilla Headline', sans-serif; font-size: 2.5rem; margin-bottom: 2rem;">Order: <span id="selected-plan-name">None</span></h2>
        
        <form style="display: flex; flex-direction: column; gap: 1.5rem;">
            <input type="hidden" id="plan-input" name="plan">
            <input type="text" id="full-name" placeholder="Full Name" required style="padding: 1rem; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.2); color: #fff; border-radius: 10px;">
            <input type="tel" id="phone-number" placeholder="Phone Number" required style="padding: 1rem; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.2); color: #fff; border-radius: 10px;">
            <input type="email" id="email" placeholder="Email" required style="padding: 1rem; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.2); color: #fff; border-radius: 10px;">
            <input type="text" id="store-company-name" placeholder="Store/Company Name" required style="padding: 1rem; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.2); color: #fff; border-radius: 10px;">
            <button type="submit" id="submit-btn" style="padding: 1rem 2rem; background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); color: #fff; border-radius: 50px; font-size: 1.2rem; cursor: pointer;">
                Submit Order
            </button>
        </form>
    </div>

    <div id="feedback-message" style="display: none; position: fixed; bottom: 20px; right: 20px; background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.2); padding: 1rem 2rem; border-radius: 50px; color: #fff; z-index: 100;"></div>

    <audio id="fire-audio" loop>
        <source src="fire.mp3" type="audio/mpeg">
    </audio>
    <audio id="click-audio">
        <source src="click.mp3" type="audio/mpeg">
    </audio>
    <audio id="button-audio">
        <source src="button.mp3" type="audio/mpeg">
    </audio>

    <script>
        const fireAudio = document.getElementById('fire-audio');
        const clickAudio = document.getElementById('click-audio');
        const buttonAudio = document.getElementById('button-audio');
        
        function updateAudioUI(enabled) {
            const toggleBtn = document.getElementById('audio-toggle-btn');
            const icon = document.getElementById('audio-icon');
            toggleBtn.style.display = 'flex';
            icon.innerText = enabled ? 'music_note' : 'music_off';
        }

        function enableAudio(enabled) {
            localStorage.setItem('immersiveAudio', enabled ? 'true' : 'false');
            if (enabled) {
                fireAudio.volume = 0.5;
                fireAudio.play().catch(e => console.error("Audio playback failed:", e));
                document.addEventListener('click', playClickSound);
            } else {
                fireAudio.pause();
                fireAudio.currentTime = 0;
                document.removeEventListener('click', playClickSound);
            }
            updateAudioUI(enabled);
        }

        function playClickSound(e) {
            if (e.target.closest('a') || e.target.tagName === 'BUTTON' || e.target.closest('button')) {
                buttonAudio.volume = 0.4;
                buttonAudio.currentTime = 0;
                buttonAudio.play().catch(e => console.error("Audio playback failed:", e));
            } else if (!e.target.closest('#audio-toggle-btn')) {
                clickAudio.currentTime = 0;
                clickAudio.play().catch(e => console.error("Audio playback failed:", e));
            }
        }

        function toggleAudio() {
            const current = localStorage.getItem('immersiveAudio') === 'true';
            enableAudio(!current);
        }

        // Apply if already enabled
        if (localStorage.getItem('immersiveAudio') === 'true') {
            enableAudio(true);
        } else {
            updateAudioUI(false);
        }

        window.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const plan = urlParams.get('plan') || localStorage.getItem('selectedPlan');
            const planName = plan ? (plan.charAt(0).toUpperCase() + plan.slice(1)) : 'None';
            document.getElementById('selected-plan-name').innerText = planName;
            document.getElementById('plan-input').value = planName;

            const form = document.querySelector('form');
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                const btn = document.getElementById('submit-btn');
                btn.disabled = true;
                btn.innerText = 'Sending...';

                const data = {
                    plan: document.getElementById('plan-input').value,
                    fullName: document.getElementById('full-name').value,
                    phoneNumber: document.getElementById('phone-number').value,
                    email: document.getElementById('email').value,
                    storeName: document.getElementById('store-company-name').value
                };

                const feedback = document.getElementById('feedback-message');
                try {
                    const response = await fetch('/api/send-email', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(data)
                    });

                    if (response.ok) {
                        feedback.innerText = 'Order submitted successfully!';
                        form.reset();
                    } else {
                        throw new Error('Failed to send email.');
                    }
                } catch (error) {
                    feedback.innerText = 'Error: ' + error.message;
                } finally {
                    feedback.style.display = 'block';
                    btn.disabled = false;
                    btn.innerText = 'Submit Order';
                    setTimeout(() => feedback.style.display = 'none', 5000);
                }
            });
        });
    </script>
</body>
</html>
